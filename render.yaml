services:
  - type: web
    name: trustpass-api
    runtime: docker
    plan: free
    rootDir: apps/api
    branch: main
    autoDeploy: true
    healthCheckPath: /api/v1/readiness
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_DEMO_ROUTES
        value: "false"
      - key: AUTH_MODE
        value: development_headers
      - key: ALLOW_SYNTHETIC_PROOF_DATA
        value: "true"
      - key: TRUSTPASS_SEED_ON_START
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: trustpass-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SEED_CONTEXT_TOKEN
        sync: false
      - key: BILLING_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: '["https://bksingh9.github.io"]'

databases:
  - name: trustpass-postgres
    plan: free
    databaseName: trustpass
    user: trustpass
