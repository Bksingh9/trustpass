services:
  - type: web
    name: trustpass-api
    runtime: docker
    plan: free
    rootDir: apps/api
    branch: main
    autoDeploy: true
    healthCheckPath: /api/v1/readiness
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_DEMO_ROUTES
        value: "false"
      - key: AUTH_MODE
        value: supabase_jwt
      - key: ALLOW_SYNTHETIC_PROOF_DATA
        value: "false"
      - key: TRUSTPASS_SEED_ON_START
        value: "false"
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: trustpass-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: BILLING_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: '["https://bksingh9.github.io"]'

databases:
  - name: trustpass-postgres
    plan: free
    databaseName: trustpass
    user: trustpass

