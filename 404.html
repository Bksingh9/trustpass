<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRUSTPASS</title>
  <style>
    :root {
      --bg: #f7f9fb;
      --panel: #ffffff;
      --ink: #162033;
      --muted: #667085;
      --border: #d8dee8;
      --accent: #147461;
      --accent-soft: #e6f4ef;
      --danger: #b42318;
      --focus: #2f80ed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }
    header {
      min-height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand { font-weight: 850; letter-spacing: 0; }
    nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    nav a {
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }
    nav a:hover, nav a.active { background: #eef2f6; color: var(--ink); }
    main { max-width: 1180px; margin: 0 auto; padding: 30px 24px 56px; }
    h1 { margin: 8px 0 0; font-size: 38px; line-height: 1.08; letter-spacing: 0; }
    h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
    h3 { margin: 0; font-size: 15px; letter-spacing: 0; }
    p { color: var(--muted); line-height: 1.6; }
    label { color: var(--muted); display: grid; gap: 6px; font-size: 13px; font-weight: 750; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      padding: 10px 12px;
      min-height: 40px;
    }
    input:focus, select:focus, textarea:focus, button:focus, a:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }
    .eyebrow { color: var(--accent); font-weight: 850; font-size: 14px; }
    .hero {
      display: grid;
      grid-template-columns: 1fr minmax(320px, 0.7fr);
      gap: 24px;
      align-items: stretch;
      padding: 20px 0 28px;
      border-bottom: 1px solid var(--border);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 1px 2px rgb(15 23 42 / 6%);
      min-width: 0;
    }
    .panel.pad { padding: 18px 20px; }
    .panel-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }
    .grid-2 { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 20px; margin-top: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); overflow: hidden; margin-top: 20px; }
    .stat { padding: 18px 20px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: 0; }
    .stat span { color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 850; }
    .stat strong { display: block; margin-top: 4px; font-size: 28px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 15px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 850;
      font-size: 14px;
      cursor: pointer;
    }
    .button.secondary { background: white; color: var(--ink); border-color: var(--border); }
    .button:disabled { opacity: 0.55; cursor: not-allowed; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .span-2 { grid-column: 1 / -1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      color: var(--muted);
      background: #f3f6fa;
      padding: 12px 16px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    td { padding: 14px 16px; border-top: 1px solid var(--border); vertical-align: top; }
    .table-wrap { overflow-x: auto; max-width: 100%; min-width: 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 5px 8px;
      background: var(--accent-soft);
      color: #09664f;
      font-weight: 850;
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.error { background: #fff0ed; color: var(--danger); }
    .api-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin-top: 14px;
      padding: 5px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: white;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .api-pill.connected { border-color: #b7e4d5; color: #075a46; background: #eefbf6; }
    .api-pill.error { border-color: #ffd5cc; color: var(--danger); background: #fff0ed; }
    .empty { color: var(--muted); padding: 18px 20px; }
    @media (max-width: 900px) {
      header { padding: 12px 16px; align-items: flex-start; flex-direction: column; }
      nav { justify-content: flex-start; }
      .hero, .grid-2, .form-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 31px; }
      main { padding: 24px 16px 44px; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="#/">TRUSTPASS</a>
    <nav id="nav">
      <a href="#/">Status</a>
      <a href="#/vendors">Vendors</a>
      <a href="#/requests">Requests</a>
      <a href="#/logs">Logs</a>
      <a href="#/connect">Connect</a>
    </nav>
  </header>
  <div id="app"></div>
  <script>
    const runtimeParams = new URLSearchParams(location.search);
    const storageKey = "trustpass-live-api-base-url";
    const buildConfiguredApiBaseUrl = "";
    const configuredApiBaseUrl = (runtimeParams.get("api") || localStorage.getItem(storageKey) || buildConfiguredApiBaseUrl || "").replace(/\/$/, "");
    if (runtimeParams.get("api")) {
      localStorage.setItem(storageKey, configuredApiBaseUrl);
    }

    let state = {
      apiBaseUrl: configuredApiBaseUrl,
      apiDraft: configuredApiBaseUrl,
      health: null,
      readiness: null,
      proof: null,
      data: {
        vendors: [],
        buyers: [],
        documents: [],
        buyer_requests: [],
        verification_decisions: [],
        trust_score_snapshots: [],
        notifications: [],
        audit_events: [],
        request_logs: []
      },
      loading: false,
      error: "",
      lastRequestId: ""
    };

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
      });
    }
    function human(value) {
      return String(value || "").split("_").filter(Boolean).map(function (part) {
        return part.charAt(0).toUpperCase() + part.slice(1);
      }).join(" ");
    }
    function endpoint(path) {
      return state.apiBaseUrl.replace(/\/$/, "") + "/" + path.replace(/^\//, "");
    }
    async function fetchJson(path, options) {
      if (!state.apiBaseUrl) throw new Error("Connect a live API URL first.");
      const response = await fetch(endpoint(path), Object.assign({
        headers: { "content-type": "application/json" },
        cache: "no-store"
      }, options || {}));
      const body = await response.json().catch(function () { return {}; });
      state.lastRequestId = response.headers.get("x-request-id") || body.request_id || "";
      if (!response.ok) {
        throw new Error(body.error || path + " returned " + response.status);
      }
      return body;
    }
    function totals() {
      return [
        ["Vendors", state.data.vendors.length],
        ["Buyers", state.data.buyers.length],
        ["Documents", state.data.documents.length],
        ["Requests", state.data.buyer_requests.length],
        ["Score history", state.data.trust_score_snapshots.length],
        ["Notifications", state.data.notifications.length]
      ];
    }
    async function refreshLiveData() {
      if (!state.apiBaseUrl) {
        render();
        return;
      }
      state.loading = true;
      state.error = "";
      render();
      try {
        state.health = await fetchJson("/api/health");
        state.readiness = await fetchJson("/api/readiness");
        const current = await fetchJson("/api/trustpass");
        state.data = Object.assign({}, state.data, current.data || {});
        state.proof = await fetchJson("/api/operational-proof");
      } catch (error) {
        state.error = error.message;
      } finally {
        state.loading = false;
        render();
      }
    }
    async function postTrustpass(action, payload) {
      const body = await fetchJson("/api/trustpass", {
        method: "POST",
        body: JSON.stringify(Object.assign({ action: action }, payload))
      });
      state.data = Object.assign({}, state.data, body.data || {});
      render();
    }
    function statusBadge() {
      if (!state.apiBaseUrl) return '<span class="api-pill">Live API not connected</span>';
      if (state.error) return '<span class="api-pill error">' + escapeHtml(state.error) + '</span>';
      if (state.readiness && state.readiness.status === "ready") return '<span class="api-pill connected">Live API ready</span>';
      return '<span class="api-pill">Checking live API</span>';
    }
    function emptyRow(columns, text) {
      return '<tr><td colspan="' + columns + '"><div class="empty">' + escapeHtml(text) + '</div></td></tr>';
    }
    function vendorRows() {
      if (!state.data.vendors.length) return emptyRow(5, state.apiBaseUrl ? "No live vendors yet." : "Connect a live API to view vendors.");
      return state.data.vendors.map(function (vendor) {
        return '<tr><td><strong>' + escapeHtml(vendor.name) + '</strong><br><span style="color: var(--muted)">' + escapeHtml(vendor.contact_email || "No contact email") + '</span></td><td>' + escapeHtml(vendor.category || "Uncategorized") + '</td><td>' + escapeHtml(vendor.location || "") + '</td><td><strong>' + escapeHtml(vendor.trust_score || 0) + '</strong></td><td><span class="badge">' + escapeHtml(human(vendor.verification_status || "draft")) + '</span></td></tr>';
      }).join("");
    }
    function requestRows() {
      if (!state.data.buyer_requests.length) return emptyRow(4, state.apiBaseUrl ? "No live buyer requests yet." : "Connect a live API to view requests.");
      return state.data.buyer_requests.map(function (request) {
        return '<tr><td><strong>' + escapeHtml(request.subject) + '</strong><br><span style="color: var(--muted)">' + escapeHtml(request.message || "") + '</span></td><td>' + escapeHtml(request.buyer_name) + '</td><td>' + escapeHtml(request.vendor_name) + '</td><td><span class="badge">' + escapeHtml(human(request.status)) + '</span></td></tr>';
      }).join("");
    }
    function logRows() {
      if (!state.data.request_logs.length) return emptyRow(4, state.apiBaseUrl ? "No live request logs yet." : "Connect a live API to view logs.");
      return state.data.request_logs.slice(0, 25).map(function (log) {
        return '<tr><td><strong>' + escapeHtml(log.method + " " + log.path) + '</strong></td><td>' + escapeHtml(log.status) + '</td><td>' + escapeHtml(log.request_id) + '</td><td>' + escapeHtml(log.created_at) + '</td></tr>';
      }).join("");
    }
    function auditRows() {
      if (!state.data.audit_events.length) return emptyRow(4, state.apiBaseUrl ? "No live audit events yet." : "Connect a live API to view audit events.");
      return state.data.audit_events.slice(0, 25).map(function (event) {
        return '<tr><td><strong>' + escapeHtml(human(event.action)) + '</strong></td><td>' + escapeHtml(event.entity_type) + '</td><td>' + escapeHtml(event.request_id || "") + '</td><td>' + escapeHtml(event.summary) + '</td></tr>';
      }).join("");
    }
    function scoreRows() {
      if (!state.data.trust_score_snapshots.length) return emptyRow(4, state.apiBaseUrl ? "No live score history yet." : "Connect a live API to view score history.");
      return state.data.trust_score_snapshots.slice(0, 25).map(function (snapshot) {
        return '<tr><td><strong>' + escapeHtml(snapshot.vendor_name) + '</strong></td><td>' + escapeHtml(snapshot.score) + '</td><td>' + escapeHtml(human(snapshot.status)) + '</td><td>' + escapeHtml(snapshot.buyer_safe_summary || snapshot.reason || "") + '</td></tr>';
      }).join("");
    }
    function notificationRows() {
      if (!state.data.notifications.length) return emptyRow(4, state.apiBaseUrl ? "No live notifications yet." : "Connect a live API to view notifications.");
      return state.data.notifications.slice(0, 25).map(function (notification) {
        return '<tr><td><strong>' + escapeHtml(notification.title) + '</strong></td><td>' + escapeHtml(notification.organization_name || "") + '</td><td>' + escapeHtml(notification.request_id || "") + '</td><td>' + escapeHtml(notification.body || "") + '</td></tr>';
      }).join("");
    }
    function selectOptions(rows, valueKey, labelKey, emptyLabel) {
      if (!rows.length) return '<option value="">' + escapeHtml(emptyLabel) + '</option>';
      return '<option value="">Select a live record</option>' + rows.map(function (row) {
        return '<option value="' + escapeHtml(row[valueKey]) + '">' + escapeHtml(row[labelKey] || row[valueKey]) + '</option>';
      }).join("");
    }
    function shellIntro() {
      return '<section class="hero"><div><div class="eyebrow">Live trust operations</div><h1>TRUSTPASS Live Gateway</h1><p>This public page no longer ships fake vendor records. Connect it to the deployed TRUSTPASS Worker API to read and write live D1-backed data.</p>' + statusBadge() + '<div class="actions"><a class="button" href="#/connect">Connect Live API</a><button class="button secondary" data-action="refresh" ' + (state.apiBaseUrl ? "" : "disabled") + '>Refresh live data</button></div></div><div class="panel pad"><h2>Connection</h2><p><strong>API base</strong><br>' + escapeHtml(state.apiBaseUrl || "Not configured") + '</p><p><strong>Last request</strong><br>' + escapeHtml(state.lastRequestId || "None") + '</p></div></section>';
    }
    function statusPage() {
      return '<main>' + shellIntro() + '<section class="panel stats">' + totals().map(function (item) { return '<div class="stat"><span>' + item[0] + '</span><strong>' + item[1] + '</strong></div>'; }).join("") + '</section><section class="grid-2"><div class="panel pad"><h2>Health</h2><pre>' + escapeHtml(JSON.stringify(state.health || {}, null, 2)) + '</pre></div><div class="panel pad"><h2>Readiness</h2><pre>' + escapeHtml(JSON.stringify(state.readiness || {}, null, 2)) + '</pre></div></section><section class="panel pad"><h2>Operational Proof</h2><p>Fetched from /api/operational-proof on the connected Worker.</p><pre>' + escapeHtml(JSON.stringify(state.proof || {}, null, 2)) + '</pre></section></main>';
    }
    function vendorsPage() {
      return '<main><div class="eyebrow">Live records</div><h1>Vendors</h1><p>Rows below come from the connected live API only.</p><section class="grid-2"><div class="panel"><div class="panel-head"><h2>Vendor Trust Profiles</h2></div><div class="table-wrap"><table><thead><tr><th>Vendor</th><th>Category</th><th>Location</th><th>Trust</th><th>Status</th></tr></thead><tbody>' + vendorRows() + '</tbody></table></div></div><form id="vendor-form" class="panel pad"><h2>Create Vendor</h2><p>Create a real record in the connected live API.</p><div class="form-grid"><label>Name<input name="name" required /></label><label>Category<input name="category" /></label><label>Location<input name="location" /></label><label>Email<input name="contact_email" type="email" /></label><div class="span-2 actions"><button class="button" ' + (state.apiBaseUrl ? "" : "disabled") + '>Create live vendor</button></div></div></form></section></main>';
    }
    function requestsPage() {
      const disabled = state.apiBaseUrl ? "" : "disabled";
      const vendorOptions = selectOptions(state.data.vendors, "id", "name", "Create a vendor first");
      const buyerOptions = selectOptions(state.data.buyers, "id", "name", "Create a buyer first");
      return '<main><div class="eyebrow">Buyer workflows</div><h1>Requests</h1><section class="panel"><div class="panel-head"><h2>Buyer Requests</h2></div><div class="table-wrap"><table><thead><tr><th>Subject</th><th>Buyer</th><th>Vendor</th><th>Status</th></tr></thead><tbody>' + requestRows() + '</tbody></table></div></section><section class="grid-2"><form id="buyer-form" class="panel pad"><h2>Create Buyer</h2><p>Create a real buyer organization in the connected live API.</p><div class="form-grid"><label>Name<input name="name" required /></label><label>Email<input name="contact_email" type="email" /></label><label class="span-2">Location<input name="location" /></label><div class="span-2 actions"><button class="button" ' + disabled + '>Create live buyer</button></div></div></form><form id="document-form" class="panel pad"><h2>Add Document Metadata</h2><p>Attach file metadata to a live vendor without storing raw files in the page.</p><div class="form-grid"><label class="span-2">Vendor<select name="vendor_id" required>' + vendorOptions + '</select></label><label>Document name<input name="name" required placeholder="Insurance certificate" /></label><label>Status<select name="status"><option value="submitted">Submitted</option><option value="under_review">Under review</option><option value="approved">Approved</option><option value="changes_requested">Changes requested</option><option value="rejected">Rejected</option><option value="expired">Expired</option></select></label><label>Expiry date<input name="expiry_date" type="date" /></label><div class="span-2 actions"><button class="button" ' + disabled + '>Add live document</button></div></div></form></section><section class="grid-2"><form id="buyer-request-form" class="panel pad"><h2>Create Buyer Request</h2><p>Open a real buyer-to-vendor request and notification trail.</p><div class="form-grid"><label>Buyer<select name="buyer_id" required>' + buyerOptions + '</select></label><label>Vendor<select name="vendor_id" required>' + vendorOptions + '</select></label><label class="span-2">Subject<input name="subject" required placeholder="Compliance review request" /></label><label class="span-2">Message<textarea name="message" rows="4"></textarea></label><div class="span-2 actions"><button class="button" ' + disabled + '>Create live request</button></div></div></form><form id="decision-form" class="panel pad"><h2>Record Verification Decision</h2><p>Write the review result, score snapshot, audit event, and notification.</p><div class="form-grid"><label>Vendor<select name="vendor_id" required>' + vendorOptions + '</select></label><label>Status<select name="status"><option value="approved">Approved</option><option value="changes_requested">Changes requested</option><option value="rejected">Rejected</option><option value="expired">Expired</option></select></label><label>Trust score<input name="trust_score" type="number" min="0" max="100" value="82" /></label><label class="span-2">Notes<textarea name="notes" rows="4">Verified from public gateway workflow.</textarea></label><div class="span-2 actions"><button class="button" ' + disabled + '>Record live decision</button></div></div></form></section></main>';
    }
    function logsPage() {
      return '<main><div class="eyebrow">Operational proof</div><h1>Logs</h1><section class="grid-2"><div class="panel"><div class="panel-head"><h2>Request Logs</h2></div><div class="table-wrap"><table><thead><tr><th>Request</th><th>Status</th><th>ID</th><th>Time</th></tr></thead><tbody>' + logRows() + '</tbody></table></div></div><div class="panel"><div class="panel-head"><h2>Audit Events</h2></div><div class="table-wrap"><table><thead><tr><th>Action</th><th>Entity</th><th>Request ID</th><th>Summary</th></tr></thead><tbody>' + auditRows() + '</tbody></table></div></div></section><section class="grid-2"><div class="panel"><div class="panel-head"><h2>Trust Score History</h2></div><div class="table-wrap"><table><thead><tr><th>Vendor</th><th>Score</th><th>Status</th><th>Summary</th></tr></thead><tbody>' + scoreRows() + '</tbody></table></div></div><div class="panel"><div class="panel-head"><h2>Notifications</h2></div><div class="table-wrap"><table><thead><tr><th>Title</th><th>Organization</th><th>Request ID</th><th>Body</th></tr></thead><tbody>' + notificationRows() + '</tbody></table></div></div></section></main>';
    }
    function connectPage() {
      return '<main><div class="eyebrow">Configuration</div><h1>Connect Live API</h1><section class="panel pad" style="max-width: 780px"><p>Paste the deployed TRUSTPASS Worker URL. This page will call /api/health, /api/readiness, /api/trustpass, and /api/operational-proof from that host.</p><form id="api-form" class="form-grid"><label class="span-2">Live API base URL<input name="api_base_url" required value="' + escapeHtml(state.apiDraft || "") + '" placeholder="https://your-live-trustpass-worker.example" /></label><div class="span-2 actions"><button class="button">Save and test</button><button class="button secondary" type="button" data-action="clear-api">Clear</button></div></form></section></main>';
    }
    const pages = {
      "/": statusPage,
      "/vendors": vendorsPage,
      "/requests": requestsPage,
      "/logs": logsPage,
      "/connect": connectPage
    };
    function currentRoute() {
      const raw = location.hash.replace("#", "") || "/";
      const parts = raw.split("?");
      return { path: parts[0] || "/", params: new URLSearchParams(parts[1] || "") };
    }
    function render() {
      const route = currentRoute();
      const path = pages[route.path] ? route.path : "/";
      document.getElementById("app").innerHTML = pages[path](route.params);
      document.title = path === "/" ? "TRUSTPASS" : "TRUSTPASS - " + path.slice(1);
      Array.from(document.querySelectorAll("#nav a")).forEach(function (link) {
        link.classList.toggle("active", link.getAttribute("href") === "#" + path);
      });
    }
    document.addEventListener("click", async function (event) {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.getAttribute("data-action");
      if (action === "refresh") {
        await refreshLiveData();
      }
      if (action === "clear-api") {
        localStorage.removeItem(storageKey);
        state.apiBaseUrl = "";
        state.apiDraft = "";
        state.health = null;
        state.readiness = null;
        state.proof = null;
        state.error = "";
        render();
      }
    });
    document.addEventListener("submit", async function (event) {
      if (event.target.id === "api-form") {
        event.preventDefault();
        const form = new FormData(event.target);
        state.apiBaseUrl = String(form.get("api_base_url") || "").replace(/\/$/, "");
        state.apiDraft = state.apiBaseUrl;
        localStorage.setItem(storageKey, state.apiBaseUrl);
        await refreshLiveData();
        location.hash = "#/";
      }
      if (event.target.id === "vendor-form") {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.target).entries());
        await postTrustpass("create_vendor", form);
        event.target.reset();
      }
      if (event.target.id === "buyer-form") {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.target).entries());
        await postTrustpass("create_buyer", form);
        event.target.reset();
      }
      if (event.target.id === "document-form") {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.target).entries());
        await postTrustpass("add_document", form);
        event.target.reset();
      }
      if (event.target.id === "buyer-request-form") {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.target).entries());
        await postTrustpass("create_buyer_request", form);
        event.target.reset();
      }
      if (event.target.id === "decision-form") {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.target).entries());
        await postTrustpass("record_verification_decision", form);
        event.target.reset();
      }
    });
    addEventListener("hashchange", render);
    render();
    refreshLiveData();
  </script>
</body>
