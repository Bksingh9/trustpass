name: Deploy TRUSTPASS Live Worker

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: Cloudflare Worker name to deploy.
        required: true
        default: trustpass-live
        type: string
      d1_database_name:
        description: Existing Cloudflare D1 database name.
        required: true
        default: trustpass-live
        type: string
      d1_database_id:
        description: Existing Cloudflare D1 database ID. Leave blank to create or resolve by name.
        required: false
        default: ""
        type: string
      d1_primary_location_hint:
        description: Optional D1 primary location hint such as wnam, enam, weur, eeur, apac, or oc.
        required: false
        default: ""
        type: string
      live_base_url:
        description: Public deployed Worker URL, ending at the app root.
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: trustpass-live-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy and prove live data path
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/live
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TRUSTPASS_WORKER_NAME: ${{ inputs.worker_name }}
      TRUSTPASS_D1_DATABASE_NAME: ${{ inputs.d1_database_name }}
      TRUSTPASS_D1_DATABASE_ID: ${{ inputs.d1_database_id }}
      TRUSTPASS_D1_PRIMARY_LOCATION_HINT: ${{ inputs.d1_primary_location_hint }}
      TRUSTPASS_LIVE_BASE_URL: ${{ inputs.live_base_url }}
      TRUSTPASS_REQUIRE_CORS_PREFLIGHT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/live/package-lock.json

      - name: Check Cloudflare deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${CLOUDFLARE_API_TOKEN}"

      - name: Ensure D1 database
        run: node scripts/ensure-cloudflare-d1.mjs

      - name: Install live app dependencies
        run: npm ci

      - name: Build Worker app
        run: npm run build

      - name: Prepare production Wrangler config
        run: node scripts/prepare-cloudflare-deploy.mjs

      - name: Apply D1 migrations
        shell: bash
        run: npx wrangler d1 migrations apply "${TRUSTPASS_D1_DATABASE_NAME}" --remote --config dist/server/wrangler.json

      - name: Deploy Worker
        run: npx wrangler deploy --config dist/server/wrangler.json

      - name: Run deployed live E2E proof
        run: npm run e2e:live

      - name: Build public gateway for deployed API
        working-directory: .
        run: node apps/web/scripts/build-pages.mjs

      - name: Verify public gateway artifact
        working-directory: .
        run: node apps/web/scripts/e2e-static.mjs

      - name: Persist deployed API URL for future checks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TRUSTPASS_VARIABLE_NAME: TRUSTPASS_LIVE_BASE_URL
          TRUSTPASS_VARIABLE_VALUE: ${{ inputs.live_base_url }}
        run: node scripts/upsert-github-actions-variable.mjs

      - name: Publish preconnected public gateway
        if: github.ref == 'refs/heads/main'
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          deploy_dir="$(mktemp -d)"
          cp -R apps/web/pages/. "$deploy_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --detach origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          git rm -r --ignore-unmatch .
          cp -R "$deploy_dir"/. .
          git add .

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy live TRUSTPASS gateway for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
