name: Deploy TRUSTPASS Live Worker

on:
  push:
    branches:
      - main
    paths:
      - apps/live/**
      - apps/web/**
      - .github/workflows/deploy-live-worker.yml
  workflow_dispatch:
    inputs:
      worker_name:
        description: Cloudflare Worker name to deploy.
        required: true
        default: trustpass-live
        type: string
      d1_database_name:
        description: Existing Cloudflare D1 database name.
        required: true
        default: trustpass-live
        type: string
      d1_database_id:
        description: Existing Cloudflare D1 database ID. Leave blank to create or resolve by name.
        required: false
        default: ""
        type: string
      d1_primary_location_hint:
        description: Optional D1 primary location hint such as wnam, enam, weur, eeur, apac, or oc.
        required: false
        default: ""
        type: string
      live_base_url:
        description: Optional public Worker URL. Leave blank to parse it from Wrangler deploy output.
        required: false
        default: ""
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: trustpass-live-worker
  cancel-in-progress: false

jobs:
  deploy-gate:
    name: Check Cloudflare deployment credentials
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TRUSTPASS_WORKER_API_TOKEN: ${{ secrets.TRUSTPASS_WORKER_API_TOKEN }}
    steps:
      - name: Check required secrets
        id: check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${CLOUDFLARE_ACCOUNT_ID}" && -n "${CLOUDFLARE_API_TOKEN}" && -n "${TRUSTPASS_WORKER_API_TOKEN}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy credentials are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy credentials or TRUSTPASS_WORKER_API_TOKEN are missing. Add all three repository secrets to deploy TRUSTPASS live." >> "$GITHUB_STEP_SUMMARY"
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              exit 1
            fi
          fi

  deploy:
    name: Deploy and prove live data path
    needs: deploy-gate
    if: needs.deploy-gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/live
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TRUSTPASS_WORKER_API_TOKEN: ${{ secrets.TRUSTPASS_WORKER_API_TOKEN }}
      TRUSTPASS_WORKER_NAME: ${{ github.event.inputs.worker_name || vars.TRUSTPASS_WORKER_NAME || 'trustpass-live' }}
      TRUSTPASS_D1_DATABASE_NAME: ${{ github.event.inputs.d1_database_name || vars.TRUSTPASS_D1_DATABASE_NAME || 'trustpass-live' }}
      TRUSTPASS_D1_DATABASE_ID: ${{ github.event.inputs.d1_database_id || vars.TRUSTPASS_D1_DATABASE_ID || '' }}
      TRUSTPASS_D1_PRIMARY_LOCATION_HINT: ${{ github.event.inputs.d1_primary_location_hint || vars.TRUSTPASS_D1_PRIMARY_LOCATION_HINT || '' }}
      TRUSTPASS_LIVE_BASE_URL: ${{ github.event.inputs.live_base_url || vars.TRUSTPASS_LIVE_BASE_URL || '' }}
      TRUSTPASS_REQUIRE_CORS_PREFLIGHT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Preflight Cloudflare deployment access
        run: node scripts/check-cloudflare-deploy-access.mjs

      - name: Ensure D1 database
        run: node scripts/ensure-cloudflare-d1.mjs

      - name: Install live app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker app
        run: pnpm run build

      - name: Prepare production Wrangler config
        run: node scripts/prepare-cloudflare-deploy.mjs

      - name: Configure Worker proof token
        shell: bash
        run: printf '%s' "$TRUSTPASS_WORKER_API_TOKEN" | pnpm exec wrangler secret put TRUSTPASS_API_TOKEN --config dist/server/wrangler.json

      - name: Apply D1 migrations
        shell: bash
        run: pnpm exec wrangler d1 migrations apply "${TRUSTPASS_D1_DATABASE_NAME}" --remote --config dist/server/wrangler.json

      - name: Deploy Worker
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler deploy --config dist/server/wrangler.json 2>&1 | tee deploy-output.log

      - name: Resolve deployed API URL
        run: node scripts/resolve-live-base-url.mjs --deploy-log deploy-output.log

      - name: Require deployed Worker API URL
        run: node scripts/require-live-base-url.mjs

      - name: Run deployed live E2E proof
        env:
          TRUSTPASS_API_TOKEN: ${{ secrets.TRUSTPASS_WORKER_API_TOKEN }}
          TRUSTPASS_LIVE_PROOF_PATH: live-e2e-proof.json
        run: pnpm run e2e:live

      - name: Upload live deployment proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trustpass-live-deployment-proof
          path: |
            apps/live/live-e2e-proof.json
            apps/live/deploy-output.log
          if-no-files-found: warn

      - name: Build public gateway for deployed API
        working-directory: .
        run: node apps/web/scripts/build-pages.mjs

      - name: Verify public gateway artifact
        working-directory: .
        run: node apps/web/scripts/e2e-static.mjs

      - name: Persist deployed API URL for future checks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TRUSTPASS_VARIABLE_NAME: TRUSTPASS_LIVE_BASE_URL
        run: node scripts/upsert-github-actions-variable.mjs

      - name: Publish preconnected public gateway
        if: github.ref == 'refs/heads/main'
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          deploy_dir="$(mktemp -d)"
          cp -R apps/web/pages/. "$deploy_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --detach origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          git rm -r --ignore-unmatch .
          cp -R "$deploy_dir"/. .
          git add .

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy live TRUSTPASS gateway for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages

      - name: Restore source checkout
        if: github.ref == 'refs/heads/main'
        working-directory: .
        run: git switch --detach "${GITHUB_SHA}"

      - name: Verify published public gateway
        if: github.ref == 'refs/heads/main'
        working-directory: .
        env:
          TRUSTPASS_PUBLIC_GATEWAY_URL: https://bksingh9.github.io/trustpass/
          TRUSTPASS_PUBLIC_GATEWAY_PROOF_PATH: apps/web/public-gateway-proof.json
        run: node apps/web/scripts/e2e-public-gateway.mjs

      - name: Upload public gateway proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trustpass-public-gateway-proof
          path: apps/web/public-gateway-proof.json
          if-no-files-found: warn
