name: TRUSTPASS Live App

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-d1-live-e2e:
    name: Worker D1 live E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/live/package-lock.json

      - name: Install live app dependencies
        run: npm ci

      - name: Build Worker app
        run: npm run build

      - name: Start local Worker app
        shell: bash
        run: |
          set -euo pipefail
          npm run dev -- --host localhost --port 4180 > live-dev.log 2>&1 &
          echo "$!" > live-dev.pid

      - name: Run live D1 E2E proof
        env:
          TRUSTPASS_LIVE_PROOF_PATH: live-e2e-proof-local.json
        run: npm run e2e:live -- --base-url http://localhost:4180/

      - name: Upload local D1 proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trustpass-local-d1-live-proof
          path: apps/live/live-e2e-proof-local.json
          if-no-files-found: warn

      - name: Show local Worker logs
        if: always()
        shell: bash
        run: cat live-dev.log || true

      - name: Stop local Worker app
        if: always()
        shell: bash
        run: kill "$(cat live-dev.pid)" || true

  deployed-live-e2e:
    name: Deployed live E2E
    if: vars.TRUSTPASS_LIVE_BASE_URL != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Require deployed Worker API URL
        env:
          TRUSTPASS_LIVE_BASE_URL: ${{ vars.TRUSTPASS_LIVE_BASE_URL }}
        run: node scripts/require-live-base-url.mjs

      - name: Verify deployed live API and data path
        env:
          TRUSTPASS_LIVE_BASE_URL: ${{ vars.TRUSTPASS_LIVE_BASE_URL }}
          TRUSTPASS_REQUIRE_CORS_PREFLIGHT: "1"
          TRUSTPASS_LIVE_PROOF_PATH: live-e2e-proof-deployed.json
        run: npm run e2e:live

      - name: Upload deployed live proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trustpass-deployed-live-proof
          path: apps/live/live-e2e-proof-deployed.json
          if-no-files-found: warn
