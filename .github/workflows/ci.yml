name: TRUSTPASS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run API style checks
        run: ruff check app tests

      - name: Run API tests
        run: pytest

  real-data-api:
    name: Real-data API E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trustpass
          POSTGRES_PASSWORD: trustpass
          POSTGRES_DB: trustpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trustpass -d trustpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+psycopg://trustpass:trustpass@localhost:5432/trustpass
      TRUSTPASS_REAL_DB_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Seed live-style records
        run: python -m app.db.seed

      - name: Run real-data E2E
        run: pytest tests/test_real_data_e2e.py

  static-pages:
    name: Static Pages smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run static Pages E2E
        run: node apps/web/scripts/e2e-static.mjs

  full-stack-demo:
    name: API-backed web smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Build static Pages app
        run: node apps/web/scripts/build-pages.mjs

      - name: Start local stack and run API-backed smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir apps/api &
          api_pid=$!
          PORT=4174 node apps/web/scripts/serve-pages.mjs &
          web_pid=$!

          cleanup() {
            kill "$api_pid" "$web_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/demo/health >/dev/null && curl -fsS http://127.0.0.1:4174/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8000/api/v1/demo/health >/dev/null
          curl -fsS http://127.0.0.1:4174/ >/dev/null
          API_BASE_URL=http://127.0.0.1:8000/api/v1 WEB_BASE_URL=http://127.0.0.1:4174 node apps/web/scripts/e2e-api-backed.mjs
