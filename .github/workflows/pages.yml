name: Build TRUSTPASS Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static site
        run: node apps/web/scripts/build-pages.mjs

      - name: Static E2E smoke test
        run: node apps/web/scripts/e2e-static.mjs

      - name: Publish gh-pages branch
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          deploy_dir="$(mktemp -d)"
          cp -R apps/web/pages/. "$deploy_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --detach origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          git rm -r --ignore-unmatch .
          cp -R "$deploy_dir"/. .
          git add .

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy GitHub Pages for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
