name: Deploy TRUSTPASS Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static site
        run: node apps/web/scripts/build-pages.mjs

      - name: Static E2E smoke test
        run: node apps/web/scripts/e2e-static.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
