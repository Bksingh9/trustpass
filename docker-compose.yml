services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trustpass
      POSTGRES_PASSWORD: trustpass
      POSTGRES_DB: trustpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustpass -d trustpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    ports:
      - "8000:8000"
    volumes:
      - api_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    volumes:
      - api_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:

